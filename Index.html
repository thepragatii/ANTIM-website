<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTIM — Some memories never leave.</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="particles" id="particles-container"></div>
    <div class="ambient-glow"></div>

    <header class="navbar">
        <div class="logo" data-localize="brand">ANTIM</div>
        <div class="nav-actions">
            <select id="lang-switcher" class="premium-select">
                <option value="en">English</option>
                <option value="hi">हिन्दी</option>
            </select>
            <button id="logout-btn" class="btn btn-secondary hidden" data-localize="logout">Logout</button>
        </div>
    </header>

    <main id="app-viewport">
        
        <section id="hero-view" class="view active">
            <div class="hero-content">
                <h1 class="cinematic-title animate-fade">ANTIM</h1>
                <p class="cinematic-subtitle" data-localize="subtitle">Some memories never leave.</p>
                
                <div class="cta-group">
                    <button class="btn btn-primary auth-trigger" data-action="save" data-localize="ctaSave">Save Memory</button>
                    <button class="btn btn-secondary auth-trigger" data-action="write" data-localize="ctaWrite">Write Letter</button>
                    <button class="btn btn-text auth-trigger" data-action="explore" data-localize="ctaExplore">Explore Stories</button>
                </div>
            </div>
        </section>

        <section id="auth-modal" class="modal hidden">
            <div class="glass-card auth-card">
                <button class="close-modal" id="close-auth-modal">&times;</button>
                
                <div class="auth-tabs">
                    <button class="tab-btn active" id="tab-login-btn" data-localize="loginTab">Login</button>
                    <button class="tab-btn" id="tab-signup-btn" data-localize="signupTab">Sign Up</button>
                </div>

                <div id="auth-feedback" class="feedback-banner hidden"></div>

                <form id="login-form" class="auth-form">
                    <div class="input-group">
                        <label for="login-email" data-localize="labelEmail">Email Address</label>
                        <input type="email" id="login-email" required placeholder="name@domain.com">
                    </div>
                    <div class="input-group">
                        <label for="login-password" data-localize="labelPassword">Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <div class="form-actions">
                        <button type="button" id="forgot-password-btn" class="btn-link" data-localize="forgotPassword">Forgot Password?</button>
                    </div>
                    <button type="submit" class="btn btn-block btn-primary" data-localize="loginSubmit">Enter Platform</button>
                </form>

                <form id="signup-form" class="auth-form hidden">
                    <div class="input-group">
                        <label for="signup-username" data-localize="labelUsername">Username</label>
                        <input type="text" id="signup-username" required placeholder="eternal_soul">
                    </div>
                    <div class="input-group">
                        <label for="signup-email" data-localize="labelEmail">Email Address</label>
                        <input type="email" id="signup-email" required placeholder="name@domain.com">
                    </div>
                    <div class="input-group">
                        <label for="signup-password" data-localize="labelPassword">Password</label>
                        <input type="password" id="signup-password" required placeholder="Minimum 6 characters">
                    </div>
                    <button type="submit" class="btn btn-block btn-primary" data-localize="signupSubmit">Begin Journey</button>
                </form>

                <div class="divider"><span data-localize="dividerText">Or Connect Via</span></div>

                <button id="google-auth-btn" class="btn btn-block btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    <span data-localize="googleAuth">Continue with Google</span>
                </button>
            </div>
        </section>

        <section id="onboarding-view" class="view hidden">
            <div class="glass-card onboarding-card">
                <h2 class="section-title" data-localize="onboardTitle">Complete Your Vessel</h2>
                <p class="section-subtitle" data-localize="onboardSubtitle">Establish your persona within the digital sanctuary.</p>
                
                <form id="onboarding-form">
                    <div class="input-group">
                        <label for="onboard-displayname" data-localize="labelDisplayName">Display Name</label>
                        <input type="text" id="onboard-displayname" required placeholder="Your Identity">
                    </div>
                    <div class="input-group">
                        <label for="onboard-bio" data-localize="labelBio">Personal Sanctuary Description (Bio)</label>
                        <textarea id="onboard-bio" rows="4" placeholder="Write something timeless..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-block btn-primary" data-localize="onboardSubmit">Finalize Vessel</button>
                </form>
            </div>
        </section>

    </main>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
